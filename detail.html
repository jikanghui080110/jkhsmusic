<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>歌曲详情 | J.的音乐</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/animations.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <div>
          <a class="text-link reveal" href="./list.html">返回列表</a>
          <h1 class="reveal reveal-delay-1">歌曲详情</h1>
        </div>
      </header>

      <section id="detail-feedback" class="status-card">正在读取歌曲详情...</section>
      <article id="detail-card" class="detail-card" hidden></article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./js/detail.js"></script>

    <script>
      // 静态元素入场
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(el => {
          if (el.isIntersecting) {
            el.target.classList.add('is-visible');
            observer.unobserve(el.target);
          }
        });
      }, { threshold: 0.12 });

      document.querySelectorAll('.reveal, .reveal-scale')
        .forEach(el => observer.observe(el));

      // 监听 detail-card 从 hidden 变为显示，触发入场动画
      const detailCard = document.getElementById('detail-card');
      const cardObserver = new MutationObserver(() => {
        if (!detailCard.hidden && !detailCard.classList.contains('reveal-scale')) {
          detailCard.classList.add('reveal-scale');
          observer.observe(detailCard);
        }
      });

      cardObserver.observe(detailCard, { attributes: true, attributeFilter: ['hidden'] });
    </script>
  </body>
</html>
