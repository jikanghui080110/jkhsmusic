<!-- detail.html 优化版 -->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>歌曲详情 | J.的音乐</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/animations.css" />
  </head>
  <body class="no-scroll"> <!-- 锁定滚动 -->
    <main class="detail-shell">
      <header class="topbar">
        <a class="text-link reveal" href="./list.html">← 返回列表</a>
        <h1 class="reveal reveal-delay-1">歌曲详情</h1>
      </header>

      <section id="detail-feedback" class="status-card">正在读取歌曲详情...</section>
      
      <!-- 这里是核心：将 detail-card 内部改为双栏结构 -->
      <article id="detail-card" class="detail-layout" hidden>
        <!-- 左侧：文字信息卡片 -->
        <div class="info-section song-card reveal-scale">
          <div id="song-info-content">
            <!-- 这里由 js 填入歌名和歌手 -->
            <h2 id="display-title">歌名加载中</h2>
            <p id="display-artist" class="muted">歌手加载中</p>
          </div>
        </div>

        <!-- 右侧：雷达图卡片 -->
        <div class="chart-section song-card reveal-scale reveal-delay-1">
          <div class="chart-header">评分雷达图</div>
          <div id="chart-container">
            <!-- 雷达图 Canvas 会注入到这里 -->
          </div>
        </div>
      </article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./js/detail.js"></script>
    <!-- ...保留你原有的 MutationObserver 脚本... -->
  </body>
</html>
